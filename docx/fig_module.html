<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>图3-3 系统功能模块图</title>
<style>
  body { margin: 0; background: #fff; font-family: "Microsoft YaHei", "微软雅黑", sans-serif; }
  .container { width: 760px; padding: 20px 20px 30px; box-sizing: border-box; background: #fff; }
  svg { display: block; margin: 0 auto; }
  .caption { text-align: center; font-size: 13px; margin-top: 12px; color: #333; }
</style>
</head>
<body>
<div class="container">
<svg width="740" height="360" viewBox="0 0 740 360" xmlns="http://www.w3.org/2000/svg"
     style="font-family:'Microsoft YaHei',sans-serif;">

  <!-- Root node -->
  <rect x="255" y="20" width="230" height="46" rx="8" fill="#1d4ed8" stroke="#1e3a8a" stroke-width="1.5"/>
  <text x="370" y="40" text-anchor="middle" font-size="13" font-weight="bold" fill="white">高校学生考证服务系统</text>
  <text x="370" y="58" text-anchor="middle" font-size="11" fill="#bfdbfe">（考证学习交流平台）</text>

  <!-- Connector lines from root to level-1 modules -->
  <!-- 8 modules, evenly spaced -->
  <!-- positions: 50, 145, 240, 335, 430, 520, 610, 700 → center x of each box -->
  <!-- root center: 370 y=66 -->
  <line x1="370" y1="66" x2="50" y2="126" stroke="#93c5fd" stroke-width="1.2"/>
  <line x1="370" y1="66" x2="155" y2="126" stroke="#93c5fd" stroke-width="1.2"/>
  <line x1="370" y1="66" x2="255" y2="126" stroke="#93c5fd" stroke-width="1.2"/>
  <line x1="370" y1="66" x2="355" y2="126" stroke="#93c5fd" stroke-width="1.2"/>
  <line x1="370" y1="66" x2="455" y2="126" stroke="#93c5fd" stroke-width="1.2"/>
  <line x1="370" y1="66" x2="555" y2="126" stroke="#93c5fd" stroke-width="1.2"/>
  <line x1="370" y1="66" x2="650" y2="126" stroke="#93c5fd" stroke-width="1.2"/>
  <line x1="370" y1="66" x2="710" y2="126" stroke="#93c5fd" stroke-width="1.2"/>

  <!-- Level-1 modules -->
  <!-- 用户模块 cx=50 -->
  <rect x="5" y="126" width="90" height="38" rx="5" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.2"/>
  <text x="50" y="142" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e40af">用户模块</text>
  <text x="50" y="157" text-anchor="middle" font-size="10" fill="#3b82f6">user</text>

  <!-- 考试模块 cx=155 -->
  <rect x="108" y="126" width="94" height="38" rx="5" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.2"/>
  <text x="155" y="142" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e40af">考试模块</text>
  <text x="155" y="157" text-anchor="middle" font-size="10" fill="#3b82f6">exam_module</text>

  <!-- 考试信息 cx=255 -->
  <rect x="205" y="126" width="100" height="38" rx="5" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.2"/>
  <text x="255" y="142" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e40af">考试信息</text>
  <text x="255" y="157" text-anchor="middle" font-size="10" fill="#3b82f6">exam_info</text>

  <!-- 帖子模块 cx=355 -->
  <rect x="308" y="126" width="94" height="38" rx="5" fill="#dcfce7" stroke="#86efac" stroke-width="1.2"/>
  <text x="355" y="142" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534">帖子模块</text>
  <text x="355" y="157" text-anchor="middle" font-size="10" fill="#22c55e">post</text>

  <!-- 问答模块 cx=455 -->
  <rect x="408" y="126" width="94" height="38" rx="5" fill="#dcfce7" stroke="#86efac" stroke-width="1.2"/>
  <text x="455" y="142" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534">问答模块</text>
  <text x="455" y="157" text-anchor="middle" font-size="10" fill="#22c55e">question/answer</text>

  <!-- 公告模块 cx=555 -->
  <rect x="508" y="126" width="94" height="38" rx="5" fill="#fef9c3" stroke="#fde047" stroke-width="1.2"/>
  <text x="555" y="142" text-anchor="middle" font-size="11" font-weight="bold" fill="#854d0e">公告模块</text>
  <text x="555" y="157" text-anchor="middle" font-size="10" fill="#a16207">announcement</text>

  <!-- 帖子回复 cx=650 -->
  <rect x="603" y="126" width="94" height="38" rx="5" fill="#fce7f3" stroke="#f9a8d4" stroke-width="1.2"/>
  <text x="650" y="142" text-anchor="middle" font-size="11" font-weight="bold" fill="#831843">帖子回复</text>
  <text x="650" y="157" text-anchor="middle" font-size="10" fill="#db2777">post_reply</text>

  <!-- 后台管理 cx=710 → shift to right -->
  <rect x="668" y="126" width="68" height="38" rx="5" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1.2"/>
  <text x="702" y="142" text-anchor="middle" font-size="10" font-weight="bold" fill="#4c1d95">后台管理</text>
  <text x="702" y="157" text-anchor="middle" font-size="9" fill="#6d28d9">admin</text>

  <!-- Sub-functions level-2 -->
  <!-- 用户模块 sub -->
  <line x1="50" y1="164" x2="15" y2="210" stroke="#c7d2fe" stroke-width="1"/>
  <line x1="50" y1="164" x2="50" y2="210" stroke="#c7d2fe" stroke-width="1"/>
  <line x1="50" y1="164" x2="85" y2="210" stroke="#c7d2fe" stroke-width="1"/>
  <rect x="2" y="210" width="78" height="30" rx="4" fill="#f0f9ff" stroke="#bae6fd" stroke-width="1"/>
  <text x="41" y="229" text-anchor="middle" font-size="10" fill="#075985">注册/登录</text>
  <rect x="15" y="248" width="70" height="30" rx="4" fill="#f0f9ff" stroke="#bae6fd" stroke-width="1"/>
  <text x="50" y="267" text-anchor="middle" font-size="10" fill="#075985">个人资料</text>
  <rect x="47" y="210" width="78" height="30" rx="4" fill="#f0f9ff" stroke="#bae6fd" stroke-width="1"/>
  <text x="86" y="229" text-anchor="middle" font-size="10" fill="#075985">密码修改</text>

  <!-- 考试模块 sub -->
  <line x1="155" y1="164" x2="128" y2="210" stroke="#c7d2fe" stroke-width="1"/>
  <line x1="155" y1="164" x2="182" y2="210" stroke="#c7d2fe" stroke-width="1"/>
  <rect x="100" y="210" width="78" height="30" rx="4" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="139" y="229" text-anchor="middle" font-size="10" fill="#14532d">模块列表</text>
  <rect x="146" y="210" width="78" height="30" rx="4" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="185" y="229" text-anchor="middle" font-size="10" fill="#14532d">模块详情</text>

  <!-- 帖子模块 sub -->
  <line x1="355" y1="164" x2="322" y2="210" stroke="#c7d2fe" stroke-width="1"/>
  <line x1="355" y1="164" x2="355" y2="210" stroke="#c7d2fe" stroke-width="1"/>
  <line x1="355" y1="164" x2="388" y2="210" stroke="#c7d2fe" stroke-width="1"/>
  <rect x="300" y="210" width="78" height="30" rx="4" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="339" y="229" text-anchor="middle" font-size="10" fill="#14532d">帖子列表</text>
  <rect x="316" y="248" width="78" height="30" rx="4" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="355" y="267" text-anchor="middle" font-size="10" fill="#14532d">发帖/编辑</text>
  <rect x="352" y="210" width="78" height="30" rx="4" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="391" y="229" text-anchor="middle" font-size="10" fill="#14532d">楼层回复</text>

  <!-- 问答模块 sub -->
  <line x1="455" y1="164" x2="428" y2="210" stroke="#c7d2fe" stroke-width="1"/>
  <line x1="455" y1="164" x2="482" y2="210" stroke="#c7d2fe" stroke-width="1"/>
  <rect x="400" y="210" width="78" height="30" rx="4" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="439" y="229" text-anchor="middle" font-size="10" fill="#14532d">问题列表</text>
  <rect x="446" y="210" width="78" height="30" rx="4" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="485" y="229" text-anchor="middle" font-size="10" fill="#14532d">发问/回答</text>

  <!-- 公告模块 sub -->
  <line x1="555" y1="164" x2="528" y2="210" stroke="#c7d2fe" stroke-width="1"/>
  <line x1="555" y1="164" x2="582" y2="210" stroke="#c7d2fe" stroke-width="1"/>
  <rect x="500" y="210" width="78" height="30" rx="4" fill="#fefce8" stroke="#fef08a" stroke-width="1"/>
  <text x="539" y="229" text-anchor="middle" font-size="10" fill="#713f12">公告列表</text>
  <rect x="546" y="210" width="78" height="30" rx="4" fill="#fefce8" stroke="#fef08a" stroke-width="1"/>
  <text x="585" y="229" text-anchor="middle" font-size="10" fill="#713f12">公告详情</text>

  <!-- 后台管理 sub -->
  <line x1="702" y1="164" x2="670" y2="210" stroke="#c7d2fe" stroke-width="1"/>
  <line x1="702" y1="164" x2="702" y2="210" stroke="#c7d2fe" stroke-width="1"/>
  <rect x="636" y="210" width="78" height="30" rx="4" fill="#faf5ff" stroke="#d8b4fe" stroke-width="1"/>
  <text x="675" y="229" text-anchor="middle" font-size="10" fill="#4c1d95">用户管理</text>
  <rect x="650" y="248" width="90" height="30" rx="4" fill="#faf5ff" stroke="#d8b4fe" stroke-width="1"/>
  <text x="695" y="267" text-anchor="middle" font-size="10" fill="#4c1d95">内容/模块管理</text>
</svg>
  <div class="caption">图3-3&nbsp;&nbsp;系统功能模块图</div>
</div>
</body>
</html>
