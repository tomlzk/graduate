<!DOCTYPE html>

<style>

</head>

<!-- ========== 样式定义 ========== -->
<style>
  .entity rect { fill: #fff; stroke: #000; stroke-width: 2; }
  .entity text { font-weight: bold; font-size: 13px; }
  .attr ellipse { fill: #fff; stroke: #000; stroke-width: 1.5; }
  .attr text { font-size: 11px; }
  .rel polygon { fill: #fff; stroke: #000; stroke-width: 1.5; }
  .rel text { font-size: 12px; font-weight: bold; }
  .line { stroke: #333; stroke-width: 1.5; fill: none; }
  .card { font-size: 12px; font-weight: bold; fill: #c00; }
</style>

<!-- 整体下移80px -->
<g transform="translate(0,80)">
