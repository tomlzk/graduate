<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>图3-2 数据库实体关系图（ER图）</title>
<style>
  body { margin: 0; background: #fff; font-family: "Microsoft YaHei", "微软雅黑", sans-serif; }
  .container { width: 760px; padding: 20px 20px 30px; box-sizing: border-box; background: #fff; }
  svg { display: block; margin: 0 auto; }
  .caption { text-align: center; font-size: 13px; margin-top: 12px; color: #333; }
</style>
</head>
<body>
<div class="container">
<svg width="720" height="420" viewBox="0 0 720 420" xmlns="http://www.w3.org/2000/svg"
     style="font-family:'Microsoft YaHei',sans-serif;">
  <!-- 定义箭头 -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#777"/>
    </marker>
  </defs>

  <!-- ===== 连线 ===== -->
  <!-- user -> post -->
  <line x1="160" y1="100" x2="160" y2="200" stroke="#aaa" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="165" y="155" font-size="11" fill="#777">1:N</text>
  <!-- user -> question -->
  <line x1="190" y1="115" x2="400" y2="205" stroke="#aaa" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="305" y="155" font-size="11" fill="#777">1:N</text>
  <!-- user -> post_reply -->
  <line x1="145" y1="120" x2="100" y2="300" stroke="#aaa" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="100" y="215" font-size="11" fill="#777">1:N</text>
  <!-- user -> announcement -->
  <line x1="195" y1="110" x2="540" y2="300" stroke="#aaa" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="400" y="195" font-size="11" fill="#777">发布</text>

  <!-- exam_module -> post -->
  <line x1="430" y1="115" x2="210" y2="208" stroke="#aaa" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="315" y="168" font-size="11" fill="#777">1:N</text>
  <!-- exam_module -> question -->
  <line x1="460" y1="120" x2="450" y2="200" stroke="#aaa" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="465" y="165" font-size="11" fill="#777">1:N</text>
  <!-- exam_module -> exam_info -->
  <line x1="520" y1="100" x2="620" y2="195" stroke="#aaa" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="575" y="145" font-size="11" fill="#777">1:N</text>

  <!-- question -> answer -->
  <line x1="470" y1="230" x2="580" y2="300" stroke="#aaa" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="528" y="265" font-size="11" fill="#777">1:N</text>
  <!-- post -> post_reply -->
  <line x1="160" y1="250" x2="110" y2="300" stroke="#aaa" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="114" y="278" font-size="11" fill="#777">1:N</text>

  <!-- ===== 实体框 ===== -->
  <!-- user -->
  <rect x="100" y="60" width="130" height="58" rx="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="165" y="84" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e3a8a">user</text>
  <text x="165" y="102" text-anchor="middle" font-size="11" fill="#1e40af">（用户表）</text>
  <text x="165" y="115" text-anchor="middle" font-size="10" fill="#3b82f6">id · username · role · status</text>

  <!-- exam_module -->
  <rect x="380" y="60" width="150" height="58" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="455" y="84" text-anchor="middle" font-size="13" font-weight="bold" fill="#14532d">exam_module</text>
  <text x="455" y="102" text-anchor="middle" font-size="11" fill="#15803d">（考试模块表）</text>
  <text x="455" y="115" text-anchor="middle" font-size="10" fill="#22c55e">id · name · description</text>

  <!-- post -->
  <rect x="90" y="200" width="140" height="55" rx="6" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="160" y="223" text-anchor="middle" font-size="13" font-weight="bold" fill="#4c1d95">post</text>
  <text x="160" y="241" text-anchor="middle" font-size="11" fill="#6d28d9">（帖子表）</text>
  <text x="160" y="253" text-anchor="middle" font-size="10" fill="#7c3aed">id · title · user_id · module_id</text>

  <!-- question -->
  <rect x="380" y="200" width="150" height="55" rx="6" fill="#fce7f3" stroke="#f9a8d4" stroke-width="1.5"/>
  <text x="455" y="223" text-anchor="middle" font-size="13" font-weight="bold" fill="#831843">question</text>
  <text x="455" y="241" text-anchor="middle" font-size="11" fill="#9d174d">（问题表）</text>
  <text x="455" y="253" text-anchor="middle" font-size="10" fill="#db2777">id · title · user_id · module_id</text>

  <!-- exam_info -->
  <rect x="580" y="195" width="130" height="55" rx="6" fill="#fef9c3" stroke="#fde047" stroke-width="1.5"/>
  <text x="645" y="218" text-anchor="middle" font-size="13" font-weight="bold" fill="#713f12">exam_info</text>
  <text x="645" y="236" text-anchor="middle" font-size="11" fill="#92400e">（考试信息表）</text>
  <text x="645" y="248" text-anchor="middle" font-size="10" fill="#b45309">id · title · module_id</text>

  <!-- post_reply -->
  <rect x="40" y="305" width="130" height="55" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="105" y="328" text-anchor="middle" font-size="13" font-weight="bold" fill="#7f1d1d">post_reply</text>
  <text x="105" y="346" text-anchor="middle" font-size="11" fill="#991b1b">（帖子回复表）</text>
  <text x="105" y="358" text-anchor="middle" font-size="10" fill="#dc2626">id · content · floor</text>

  <!-- answer -->
  <rect x="540" y="305" width="120" height="55" rx="6" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1.5"/>
  <text x="600" y="328" text-anchor="middle" font-size="13" font-weight="bold" fill="#064e3b">answer</text>
  <text x="600" y="346" text-anchor="middle" font-size="11" fill="#065f46">（回答表）</text>
  <text x="600" y="358" text-anchor="middle" font-size="10" fill="#059669">id · content · question_id</text>

  <!-- announcement -->
  <rect x="460" y="305" width="65" height="55" rx="6" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>
  <text x="492" y="325" text-anchor="middle" font-size="11" font-weight="bold" fill="#7c2d12">announce</text>
  <text x="492" y="340" text-anchor="middle" font-size="10" fill="#9a3412">ment</text>
  <text x="492" y="354" text-anchor="middle" font-size="10" fill="#ea580c">（公告）</text>
</svg>
  <div class="caption">图3-2&nbsp;&nbsp;数据库实体关系图（ER图）</div>
</div>
</body>
</html>
