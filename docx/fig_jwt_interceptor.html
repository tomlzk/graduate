<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>图4-3 JWT双层拦截器权限校验流程示意</title>
<style>
  body { margin: 0; background: #fff; font-family: "Microsoft YaHei", "微软雅黑", sans-serif; }
  .container { width: 760px; padding: 24px 20px 32px; box-sizing: border-box; background: #fff; }
  .caption { text-align: center; font-size: 13px; margin-top: 16px; color: #333; }
</style>
</head>
<body>
<div class="container">
<svg width="720" height="530" viewBox="0 0 720 530" xmlns="http://www.w3.org/2000/svg"
     style="font-family:'Microsoft YaHei',sans-serif; font-size:13px;">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#444"/>
    </marker>
    <marker id="arr-red" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#c0392b"/>
    </marker>
    <marker id="arr-green" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#27ae60"/>
    </marker>
  </defs>

  <!-- ===== 第一列：客户端 ===== -->
  <!-- 起点：客户端请求 -->
  <rect x="20" y="20" width="110" height="44" rx="6" fill="#d6eaf8" stroke="#2980b9" stroke-width="1.5"/>
  <text x="75" y="38" text-anchor="middle" fill="#1a5276" font-weight="bold">客户端</text>
  <text x="75" y="55" text-anchor="middle" fill="#1a5276">（浏览器）</text>

  <!-- 向右箭头：发送HTTP请求 -->
  <line x1="130" y1="42" x2="210" y2="42" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="170" y="35" text-anchor="middle" fill="#555" font-size="11">HTTP 请求</text>
  <text x="170" y="56" text-anchor="middle" fill="#888" font-size="10">（含/不含 Token）</text>

  <!-- ===== 第一个判断框：JwtInterceptor ===== -->
  <!-- 标题框 -->
  <rect x="210" y="10" width="160" height="24" rx="4" fill="#2980b9"/>
  <text x="290" y="26" text-anchor="middle" fill="#fff" font-weight="bold" font-size="12">JwtInterceptor</text>

  <!-- 判断：是否携带有效Token -->
  <!-- 菱形 -->
  <polygon points="290,48 360,80 290,112 220,80" fill="#ebf5fb" stroke="#2980b9" stroke-width="1.5"/>
  <text x="290" y="75" text-anchor="middle" fill="#154360" font-size="12">携带有效</text>
  <text x="290" y="92" text-anchor="middle" fill="#154360" font-size="12">Token？</text>

  <!-- 否 → 返回401 -->
  <line x1="220" y1="80" x2="120" y2="80" stroke="#c0392b" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <text x="168" y="73" text-anchor="middle" fill="#c0392b" font-size="11">否</text>
  <!-- 401 框 -->
  <rect x="20" y="62" width="100" height="36" rx="5" fill="#fadbd8" stroke="#c0392b" stroke-width="1.5"/>
  <text x="70" y="78" text-anchor="middle" fill="#922b21" font-size="12">返回 401</text>
  <text x="70" y="93" text-anchor="middle" fill="#922b21" font-size="11">未认证</text>

  <!-- 是 → 解析userId/role写入context，向下走 -->
  <line x1="290" y1="112" x2="290" y2="148" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="302" y="134" fill="#1e8449" font-size="11">是</text>

  <!-- 解析信息框 -->
  <rect x="210" y="148" width="160" height="44" rx="5" fill="#eafaf1" stroke="#27ae60" stroke-width="1.5"/>
  <text x="290" y="167" text-anchor="middle" fill="#1a5e35" font-size="12">解析 userId / role</text>
  <text x="290" y="184" text-anchor="middle" fill="#1a5e35" font-size="11">写入 Request 属性</text>

  <!-- 向下继续 -->
  <line x1="290" y1="192" x2="290" y2="228" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ===== 第二个判断：是否访问 /api/admin ===== -->
  <polygon points="290,232 360,264 290,296 220,264" fill="#fef9e7" stroke="#f39c12" stroke-width="1.5"/>
  <text x="290" y="259" text-anchor="middle" fill="#784212" font-size="12">访问 /api/admin</text>
  <text x="290" y="276" text-anchor="middle" fill="#784212" font-size="12">前缀接口？</text>

  <!-- 否 → 直接到Controller -->
  <line x1="360" y1="264" x2="490" y2="264" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="425" y="257" text-anchor="middle" fill="#27ae60" font-size="11">否（普通接口）</text>

  <!-- 是 → AdminInterceptor -->
  <line x1="290" y1="296" x2="290" y2="332" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="302" y="318" fill="#555" font-size="11">是</text>

  <!-- ===== AdminInterceptor ===== -->
  <rect x="210" y="322" width="160" height="24" rx="4" fill="#f39c12"/>
  <text x="290" y="338" text-anchor="middle" fill="#fff" font-weight="bold" font-size="12">AdminInterceptor</text>

  <!-- 判断：role === admin？ -->
  <polygon points="290,354 360,386 290,418 220,386" fill="#fef9e7" stroke="#f39c12" stroke-width="1.5"/>
  <text x="290" y="381" text-anchor="middle" fill="#784212" font-size="12">role =</text>
  <text x="290" y="398" text-anchor="middle" fill="#784212" font-size="12">'admin'？</text>

  <!-- 否 → 返回403 -->
  <line x1="220" y1="386" x2="120" y2="386" stroke="#c0392b" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <text x="168" y="379" text-anchor="middle" fill="#c0392b" font-size="11">否</text>
  <rect x="20" y="368" width="100" height="36" rx="5" fill="#fadbd8" stroke="#c0392b" stroke-width="1.5"/>
  <text x="70" y="384" text-anchor="middle" fill="#922b21" font-size="12">返回 403</text>
  <text x="70" y="399" text-anchor="middle" fill="#922b21" font-size="11">权限不足</text>

  <!-- 是 → 向右到Controller（管理员通过） -->
  <line x1="360" y1="386" x2="490" y2="386" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="425" y="379" text-anchor="middle" fill="#27ae60" font-size="11">是（管理员）</text>

  <!-- ===== Controller 区域 ===== -->
  <!-- 合并两条线汇入Controller：264和386 → 用折线 -->
  <!-- 普通接口线（y=264）直接进Controller -->
  <!-- 管理员通过线（y=386）需要向下折到Controller -->
  <!-- 两条线汇合点设在x=490，然后向下到y=430进Controller -->

  <!-- 从264线向下折到430 -->
  <line x1="490" y1="264" x2="540" y2="264" stroke="#27ae60" stroke-width="1.5"/>
  <line x1="540" y1="264" x2="540" y2="430" stroke="#27ae60" stroke-width="1.5"/>
  <!-- 从386线向下折到430 -->
  <line x1="490" y1="386" x2="540" y2="386" stroke="#27ae60" stroke-width="1.5"/>
  <line x1="540" y1="386" x2="540" y2="430" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <!-- Controller框 -->
  <rect x="480" y="430" width="150" height="44" rx="6" fill="#e8f8f5" stroke="#1abc9c" stroke-width="1.5"/>
  <text x="555" y="449" text-anchor="middle" fill="#0e6655" font-weight="bold" font-size="12">Controller</text>
  <text x="555" y="466" text-anchor="middle" fill="#0e6655" font-size="11">执行业务逻辑</text>

  <!-- 向右返回 -->
  <line x1="630" y1="452" x2="700" y2="452" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="665" y="445" text-anchor="middle" fill="#555" font-size="11">返回</text>
  <rect x="695" y="434" width="20" height="36" rx="3" fill="#d5f5e3" stroke="#1abc9c" stroke-width="1"/>
  <!-- 竖排"响应"文字 -->
  <text x="705" y="450" text-anchor="middle" fill="#0e6655" font-size="10">响</text>
  <text x="705" y="463" text-anchor="middle" fill="#0e6655" font-size="10">应</text>

  <!-- ===== 图例 ===== -->
  <line x1="20" y1="480" x2="50" y2="480" stroke="#c0392b" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <text x="56" y="484" fill="#c0392b" font-size="11">拦截（返回错误码）</text>
  <line x1="200" y1="480" x2="230" y2="480" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="236" y="484" fill="#27ae60" font-size="11">校验通过（继续）</text>
  <line x1="380" y1="480" x2="410" y2="480" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="416" y="484" fill="#444" font-size="11">普通流程</text>
</svg>
<div class="caption">图4-3&nbsp;&nbsp;JWT 双层拦截器权限校验流程示意</div>
</div>
</body>
</html>
